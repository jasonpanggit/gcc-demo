name: Test Tool Selection - Progressive Gates

# Progressive 5-stage pipeline for MCP tool selection testing.
# Stages: unit → manifest-quality → golden (integration) → smoke → e2e
# Each stage gates on the previous; smoke/e2e skip for draft PRs.

on:
  push:
    branches: [main, develop]
    paths:
      - 'app/agentic/eol/agents/**'
      - 'app/agentic/eol/utils/**'
      - 'app/agentic/eol/mcp_servers/**'
      - 'app/agentic/eol/tests/**'
      - 'app/agentic/eol/scripts/**'
      - '.github/workflows/test-tool-selection.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'app/agentic/eol/agents/**'
      - 'app/agentic/eol/utils/**'
      - 'app/agentic/eol/mcp_servers/**'
      - 'app/agentic/eol/tests/**'
      - 'app/agentic/eol/scripts/**'
      - '.github/workflows/test-tool-selection.yml'
  workflow_dispatch:
    inputs:
      skip_smoke:
        description: 'Skip smoke tests'
        type: boolean
        default: false
      skip_e2e:
        description: 'Skip E2E tests'
        type: boolean
        default: false

env:
  PYTHON_VERSION: "3.11"
  APP_DIR: "app/agentic/eol"

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Stage 1: Unit Tests (<30s)
  # Pure Python, no external dependencies. Tests routing logic, domain
  # classification, tool scoring, and metadata validation.
  # ──────────────────────────────────────────────────────────────────────
  unit-tests:
    name: "Stage 1: Unit Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-unit-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-unit-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r ${{ env.APP_DIR }}/requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run unit tests
        run: |
          pytest ${{ env.APP_DIR }}/tests/ \
            -m "unit" \
            -v \
            --tb=short \
            --cov=${{ env.APP_DIR }} \
            --cov-report=xml:coverage-unit.xml \
            --cov-report=term \
            --junitxml=results-unit.xml \
            --timeout=30
        env:
          USE_MOCK_DATA: "true"
          TESTING: "true"
          MOCK_AGENT_DELAY_MS: "0"
          AZURE_OPENAI_ENDPOINT: "https://test.openai.azure.com"
          AZURE_OPENAI_DEPLOYMENT_NAME: "gpt-4"
          ENVIRONMENT: "testing"
          LOG_ANALYTICS_WORKSPACE_ID: "test-workspace-id"

      - name: Upload unit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: |
            results-unit.xml
            coverage-unit.xml
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────
  # Stage 1.5: Manifest Quality (<30s)
  # Runs manifest linter and quality scorecard against all tool manifests.
  # Catches metadata issues (missing tags, bad example queries, conflict
  # documentation gaps) before they degrade tool selection accuracy.
  # Runs in parallel with unit tests for speed.
  # ──────────────────────────────────────────────────────────────────────
  manifest-quality:
    name: "Stage 1.5: Manifest Quality"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-manifest-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-manifest-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r ${{ env.APP_DIR }}/requirements.txt
        env:
          USE_MOCK_DATA: "true"
          TESTING: "true"
          AZURE_OPENAI_ENDPOINT: "https://test.openai.azure.com"
          AZURE_OPENAI_DEPLOYMENT_NAME: "gpt-4"
          ENVIRONMENT: "testing"
          LOG_ANALYTICS_WORKSPACE_ID: "test-workspace-id"

      - name: Run manifest linter
        id: linter
        run: |
          cd ${{ env.APP_DIR }}
          python scripts/manifest_linter.py \
            --fail-threshold critical \
            --github-summary "$GITHUB_STEP_SUMMARY"
          echo "linter_exit=$?" >> "$GITHUB_OUTPUT"

          # Also generate JSON artifact
          python scripts/manifest_linter.py --json > /tmp/manifest-lint-results.json
        env:
          USE_MOCK_DATA: "true"
          TESTING: "true"
          AZURE_OPENAI_ENDPOINT: "https://test.openai.azure.com"
          AZURE_OPENAI_DEPLOYMENT_NAME: "gpt-4"
          ENVIRONMENT: "testing"
          LOG_ANALYTICS_WORKSPACE_ID: "test-workspace-id"

      - name: Generate quality scorecard
        id: scorecard
        if: always()
        run: |
          cd ${{ env.APP_DIR }}
          python scripts/manifest_quality_scorecard.py \
            --min-score 40 \
            --top-gaps 20 \
            --github-summary "$GITHUB_STEP_SUMMARY"

          # Also generate JSON artifact
          python scripts/manifest_quality_scorecard.py --json > /tmp/manifest-quality-scorecard.json
        env:
          USE_MOCK_DATA: "true"
          TESTING: "true"
          AZURE_OPENAI_ENDPOINT: "https://test.openai.azure.com"
          AZURE_OPENAI_DEPLOYMENT_NAME: "gpt-4"
          ENVIRONMENT: "testing"
          LOG_ANALYTICS_WORKSPACE_ID: "test-workspace-id"

      - name: Upload manifest quality artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: manifest-quality-results
          path: |
            /tmp/manifest-lint-results.json
            /tmp/manifest-quality-scorecard.json
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────
  # Stage 2: Golden Scenario Integration Tests (<2min)
  # Runs golden scenarios with Azure OpenAI (gpt-4o-mini for cost).
  # DeterministicMCPClient provides fixture-based tool responses.
  # Validates tool selection contracts from YAML fixture files.
  # ──────────────────────────────────────────────────────────────────────
  golden-scenarios:
    name: "Stage 2: Golden Scenarios"
    runs-on: ubuntu-latest
    needs: [unit-tests, manifest-quality]
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-golden-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-golden-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r ${{ env.APP_DIR }}/requirements.txt
          pip install pytest pytest-asyncio

      - name: Run golden scenario tests
        run: |
          pytest ${{ env.APP_DIR }}/tests/ \
            -m "golden" \
            -v \
            --tb=long \
            --junitxml=results-golden.xml \
            --timeout=120
        env:
          USE_MOCK_DATA: "true"
          TESTING: "true"
          MOCK_AGENT_DELAY_MS: "0"
          ENVIRONMENT: "testing"
          # Azure OpenAI for realistic tool selection
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_DEPLOYMENT_NAME: "gpt-4o-mini"
          LOG_ANALYTICS_WORKSPACE_ID: "test-workspace-id"

      - name: Upload golden test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: golden-test-results
          path: results-golden.xml
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────
  # Stage 3: Smoke Tests (<5min)
  # Runs a small set of critical queries against the deployed app.
  # Skipped for draft PRs and when manually disabled.
  # ──────────────────────────────────────────────────────────────────────
  smoke-tests:
    name: "Stage 3: Smoke Tests"
    runs-on: ubuntu-latest
    needs: [golden-scenarios]
    if: |
      !github.event.pull_request.draft &&
      github.event.inputs.skip_smoke != 'true'
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-smoke-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-smoke-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r ${{ env.APP_DIR }}/requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run smoke tests against deployed app
        run: |
          pytest ${{ env.APP_DIR }}/tests/ \
            -m "remote and not slow" \
            -v \
            --tb=short \
            --junitxml=results-smoke.xml \
            --timeout=300 \
            -x
        env:
          USE_MOCK_DATA: "false"
          TESTING: "true"
          BASE_URL: ${{ secrets.DEPLOYED_APP_URL }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_DEPLOYMENT_NAME: "gpt-4o-mini"

      - name: Upload smoke test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-results
          path: results-smoke.xml
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────
  # Stage 4: E2E Tests (<10min)
  # Playwright browser tests for full user journeys.
  # Skipped for draft PRs and when manually disabled.
  # ──────────────────────────────────────────────────────────────────────
  e2e-tests:
    name: "Stage 4: E2E Tests"
    runs-on: ubuntu-latest
    needs: [smoke-tests]
    if: |
      !github.event.pull_request.draft &&
      github.event.inputs.skip_e2e != 'true'
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-e2e-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-e2e-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r ${{ env.APP_DIR }}/requirements.txt
          pip install pytest pytest-asyncio pytest-playwright

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Start application server
        run: |
          cd ${{ env.APP_DIR }}
          USE_MOCK_DATA=true nohup uvicorn main:app --host 0.0.0.0 --port 8000 > /tmp/app.log 2>&1 &
          echo $! > /tmp/app.pid
          # Wait for server to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1 || \
               curl -sf http://localhost:8000/ > /dev/null 2>&1; then
              echo "Server started successfully"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Server failed to start. Logs:"
              cat /tmp/app.log
              exit 1
            fi
            sleep 1
          done
        env:
          USE_MOCK_DATA: "true"
          TESTING: "true"
          MOCK_AGENT_DELAY_MS: "0"
          AZURE_OPENAI_ENDPOINT: "https://test.openai.azure.com"
          AZURE_OPENAI_DEPLOYMENT_NAME: "gpt-4"
          ENVIRONMENT: "testing"
          LOG_ANALYTICS_WORKSPACE_ID: "test-workspace-id"

      - name: Run E2E tests
        run: |
          pytest ${{ env.APP_DIR }}/tests/ui/ \
            -v \
            --tb=short \
            --junitxml=results-e2e.xml \
            --timeout=600
        env:
          USE_MOCK_DATA: "true"
          TESTING: "true"
          BASE_URL: "http://localhost:8000"

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: results-e2e.xml
          retention-days: 14

      - name: Upload app server logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-server-logs
          path: /tmp/app.log
          retention-days: 7

      - name: Stop application server
        if: always()
        run: |
          if [ -f /tmp/app.pid ]; then
            kill "$(cat /tmp/app.pid)" || true
          fi

  # ──────────────────────────────────────────────────────────────────────
  # Summary: Aggregate results and post PR comment
  # ──────────────────────────────────────────────────────────────────────
  test-summary:
    name: "Test Summary"
    runs-on: ubuntu-latest
    needs: [unit-tests, manifest-quality, golden-scenarios, smoke-tests, e2e-tests]
    if: always()

    steps:
      - name: Determine stage results
        id: results
        run: |
          echo "unit=${{ needs.unit-tests.result }}" >> "$GITHUB_OUTPUT"
          echo "manifest=${{ needs.manifest-quality.result }}" >> "$GITHUB_OUTPUT"
          echo "golden=${{ needs.golden-scenarios.result }}" >> "$GITHUB_OUTPUT"
          echo "smoke=${{ needs.smoke-tests.result }}" >> "$GITHUB_OUTPUT"
          echo "e2e=${{ needs.e2e-tests.result }}" >> "$GITHUB_OUTPUT"

      - name: Print summary
        run: |
          echo "## Tool Selection Test Results"
          echo ""
          echo "| Stage | Status | Description |"
          echo "|-------|--------|-------------|"
          echo "| Unit Tests | ${{ needs.unit-tests.result }} | Routing logic, classification |"
          echo "| Manifest Quality | ${{ needs.manifest-quality.result }} | Linter + quality scorecard |"
          echo "| Golden Scenarios | ${{ needs.golden-scenarios.result }} | Tool selection contracts |"
          echo "| Smoke Tests | ${{ needs.smoke-tests.result }} | Deployed app validation |"
          echo "| E2E Tests | ${{ needs.e2e-tests.result }} | Full user journeys |"
          echo ""

          # Fail if required stages failed
          if [ "${{ needs.unit-tests.result }}" != "success" ]; then
            echo "::error::Unit tests failed — blocking merge"
            exit 1
          fi
          if [ "${{ needs.manifest-quality.result }}" != "success" ]; then
            echo "::warning::Manifest quality checks had issues — review before merge"
          fi
          if [ "${{ needs.golden-scenarios.result }}" != "success" ]; then
            echo "::error::Golden scenario tests failed — blocking merge"
            exit 1
          fi
          # Smoke and E2E are non-blocking (may be skipped for drafts)
          if [ "${{ needs.smoke-tests.result }}" == "failure" ]; then
            echo "::warning::Smoke tests failed — review before merge"
          fi
          if [ "${{ needs.e2e-tests.result }}" == "failure" ]; then
            echo "::warning::E2E tests failed — review before merge"
          fi

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const unit = '${{ needs.unit-tests.result }}';
            const manifest = '${{ needs.manifest-quality.result }}';
            const golden = '${{ needs.golden-scenarios.result }}';
            const smoke = '${{ needs.smoke-tests.result }}';
            const e2e = '${{ needs.e2e-tests.result }}';

            const icon = (r) => {
              if (r === 'success') return '✅';
              if (r === 'failure') return '❌';
              if (r === 'skipped') return '⏭️';
              return '⚠️';
            };

            const allRequired = unit === 'success' && golden === 'success';
            const allOptional = smoke !== 'failure' && e2e !== 'failure';
            const manifestOk = manifest === 'success';

            const body = `## 🧪 Tool Selection Test Results

            | Stage | Status | Gate |
            |-------|--------|------|
            | Unit Tests | ${icon(unit)} ${unit} | Required |
            | Manifest Quality | ${icon(manifest)} ${manifest} | Advisory |
            | Golden Scenarios | ${icon(golden)} ${golden} | Required |
            | Smoke Tests | ${icon(smoke)} ${smoke} | Optional |
            | E2E Tests | ${icon(e2e)} ${e2e} | Optional |

            ${allRequired && allOptional && manifestOk
              ? '✅ **All gates passed** — ready to merge'
              : allRequired && !manifestOk
                ? '⚠️ **Required gates passed** — manifest quality needs attention'
                : allRequired
                  ? '⚠️ **Required gates passed** — optional stages need review'
                  : '❌ **Required gates failed** — fix before merging'}

            <details>
            <summary>Test artifacts</summary>

            Download test results from [Actions artifacts](${context.payload.repository.html_url}/actions/runs/${context.runId})

            Artifacts include:
            - Unit test results and coverage report
            - **Manifest lint results** (JSON) — shows all quality issues
            - **Manifest quality scorecard** (JSON) — per-tool scores and gaps
            - Golden scenario test results

            **Cost estimate:** ~$0.01-0.05 for this run (gpt-4o-mini)
            </details>
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
